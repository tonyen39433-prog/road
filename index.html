<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>六度四攝 - 菩薩道</title>
    <style>
        :root {
            --primary-color: #5C6B73; 
            --accent-color: #D3A25D; 
            --bg-color: #FAF8F5; 
            --text-color: #333333;
            --card-bg: #FFFFFF;
            --success-color: #4A7C59; 
            --light-success: #EBF5EE;
            
            --node-default-bg: #EAE6DF;
            --node-default-border: #D1C9BC;
            --node-active-bg: #FFF3D6;
            --node-active-border: #D3A25D;
            --node-active-text: #8C6221;
        }

        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .game-container {
            width: 100%;
            max-width: 550px;
            background-color: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.05);
            padding: 25px;
            border-top: 8px solid var(--primary-color);
            box-sizing: border-box;
            position: relative;
        }

        .header-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            font-size: 0.85rem;
            color: #777;
            border-bottom: 1px solid #EEE;
            padding-bottom: 8px;
        }

        .precept-badge {
            display: inline-block;
            background-color: #EAECE9;
            color: var(--primary-color);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .story-section {
            font-size: 1.05rem;
            line-height: 1.8;
            margin-bottom: 15px;
            white-space: pre-line;
        }

        /* --- 法語小說明看板 --- */
        .msg-box {
            background-color: #F5F3EE;
            border: 1px solid #E4DFD5;
            color: #555;
            padding: 12px 18px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.95rem;
            line-height: 1.6;
            min-height: 48px;
            text-align: center;
            transition: all 0.3s ease;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.02);
        }
        .msg-box.error {
            background-color: #FDF2F2;
            border-color: #F3D8D8;
            color: #A94442;
            animation: shake 0.3s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* --- 迷宮畫布與節點地圖區 --- */
        .map-container {
            position: relative;
            width: 100%;
            height: 480px;
            background: radial-gradient(circle, #FCFAF7 0%, #F3EFE9 100%);
            border: 2px solid #E4DFD5;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 20px;
            user-select: none;
        }

        /* SVG 繪製連接線 */
        .map-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .map-line {
            stroke: var(--accent-color);
            stroke-width: 6;
            stroke-dasharray: 0;
            opacity: 0; /* 預設隱藏，答對才顯示 */
            transition: opacity 0.6s ease;
        }

        .map-line.active {
            opacity: 1;
        }

        /* 修行次第節點 (無數字打亂版) */
        .step-node {
            position: absolute;
            width: 82px;
            height: 82px;
            margin-left: -41px; 
            margin-top: -41px;
            background-color: var(--node-default-bg);
            border: 2px solid var(--node-default-border);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 2;
            box-shadow: 0 4px 8px rgba(0,0,0,0.04);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            -webkit-tap-highlight-color: transparent;
        }

        .step-node .node-text {
            font-size: 0.82rem;
            font-weight: bold;
            color: #555;
            text-align: center;
            line-height: 1.3;
            padding: 0 6px;
        }

        /* 點亮激活狀態 */
        .step-node.active {
            background-color: var(--node-active-bg);
            border-color: var(--node-active-border);
            color: var(--node-active-text);
            box-shadow: 0 0 15px rgba(211, 162, 93, 0.5);
            transform: scale(1.08);
        }

        .step-node.active .node-text {
            color: #614417;
        }

        /* --- 成功解鎖區 --- */
        .unlock-area {
            display: none;
            background-color: var(--light-success);
            border-left: 5px solid var(--success-color);
            color: #2D5136;
            padding: 15px;
            border-radius: 8px;
            margin-top: 25px;
            animation: fadeIn 0.5s ease;
            line-height: 1.6;
        }

        .action-btn {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 1.05rem;
            cursor: pointer;
            margin-top: 15px;
            transition: background 0.2s;
            font-weight: bold;
        }

        .action-btn.disabled {
            background-color: #CCCCCC;
            cursor: not-allowed;
        }

        .reset-btn {
            background-color: #FFFFFF;
            border: 1px solid #D1C9BC;
            color: #666;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
            display: block;
            margin: 0 auto 15px auto;
        }

        .reset-btn:hover {
            background-color: #FAF8F5;
            color: var(--accent-color);
            border-color: var(--accent-color);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="game-container">
    <div class="header-info">
        <span>六度四攝  </span>
        <span>最後一站：菩薩道</span>
    </div>

    <div class="precept-badge">菩提行願圖</div>
    
    <div class="story-section">
        迷宮中散落著不同的修行階段。請發揮智慧，<b>尋找下一個合適的成佛次第</b>。
        
        <b>操作說明：</b>
        1. 點擊任何圓圈，皆可<b>閱讀其法義小說明</b>。
        2. 當你依序點中正確的下一步，菩提之路便會<b>顯發金色光芒並相連</b>！
    </div>

    <button class="reset-btn" onclick="resetGame()">🔄 重置修行路徑</button>

    <!-- 智慧法語看板 -->
    <div class="msg-box" id="msgBox">🕯️ 請先在亂序的迷宮中尋找起點：【凡夫發心】...</div>

    <!-- 節點迷宮地圖 -->
    <div class="map-container" id="mapContainer">
        <!-- SVG 繪線層 -->
        <svg class="map-svg" id="mapSvg">
            <!-- 線段由 JS 動態生成 -->
        </svg>

        <!-- 節點層由 JS 渲染 -->
    </div>

    <!-- 成功通關提示 -->
    <div class="unlock-area" id="unlockArea">
        <b>🌸 慧眼觀照，自證菩提：</b><br>
        你在完全亂序的紅塵干擾中，憑藉智慧明辨次第，成功點亮並交織出這條殊勝的菩提大道！
        
        恭喜你獲得：<b>行願圓滿金蓮</b>！
    </div>

    <button class="action-btn disabled" id="nextBtn" disabled onclick="nextStep()">請先完成修行次第</button>
</div>

<script>
    // 11 個修行次第、原始索引、與其法義小說明
    // 加上 coordinates (位置)
    const stagesData = [
        { origId: 0, name: "凡夫發心", desc: "「發菩提心，萬行之始。」眾生皆有佛性，修行從這裡起步。" },
        { origId: 1, name: "受持三皈", desc: "「皈依佛、法、僧。」確定人生的解脫方向，不再迷茫。" },
        { origId: 2, name: "嚴持五戒", desc: "「不殺、不盜、不邪淫、不妄語、不飲酒。」防非止惡，淨化人格。" },
        { origId: 3, name: "廣修布施", desc: "「捨去慳貪，廣結善緣。」財布施、法布施、無畏布施。" },
        { origId: 4, name: "常行忍辱", desc: "「難忍能忍，心如大地。」調伏嗔恨，以寬容面對逆境。" },
        { origId: 5, name: "勇猛精進", desc: "「不懈不退，向善前行。」恆持道心，不因疲憊而止步。" },
        { origId: 6, name: "修習禪定", desc: "「主敬存心，心不隨境轉。」專注當下，不生雜念與妄想。" },
        { origId: 7, name: "顯發般若", desc: "「智慧開顯，照見空性。」不被現象迷惑，體證大乘智慧。" },
        { origId: 8, name: "實踐四攝", desc: "「布施、愛語、利行、同事。」走入人群，以慈悲方法攝受眾生。" },
        { origId: 9, name: "悲智雙運", desc: "「悲不滯空，智不隨有。」既有出世的清淨智慧，又有入世的慈悲行願。" },
        { origId: 10, name: "圓滿菩提", desc: "「功德圓滿，覺行圓滿。」抵達佛道終點，圓滿無上正等正覺。" }
    ];

    // 固定的 11 個美觀座標分布
    const positions = [
        { x: 18, y: 90 }, { x: 50, y: 88 }, { x: 82, y: 80 },
        { x: 75, y: 60 }, { x: 45, y: 68 }, { x: 18, y: 65 },
        { x: 15, y: 45 }, { x: 45, y: 42 }, { x: 80, y: 38 },
        { x: 72, y: 18 }, { x: 45, y: 10 }
    ];

    // 遊戲運行中的資料對應數組
    let gameNodes = [];
    let currentStep = -1; // 當前正確修行進度 (從原本 stagesData 索引 0 到 10)
    let gameActive = true;

    // Web Audio API 聲音模擬
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playSound(type) {
        if (!audioCtx) return;
        if (audioCtx.state === 'suspended') audioCtx.resume();

        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        if (type === 'bell') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, audioCtx.currentTime); 
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.2);
            osc.start();
            osc.stop(audioCtx.currentTime + 1.2);
        } else if (type === 'wood') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(140, audioCtx.currentTime); 
            gain.gain.setValueAtTime(0.8, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.15);
        }
    }

    // 初始化並隨機打亂關卡位置
    function initMap() {
        const container = document.getElementById('mapContainer');
        const svg = document.getElementById('mapSvg');
        
        // 1. 清空舊元素
        const nodes = container.querySelectorAll('.step-node');
        nodes.forEach(n => n.remove());
        svg.innerHTML = '';

        // 2. 複製一份數據
        const tempStages = [...stagesData];
        // 3. 隨機打亂（Knuth-Fisher-Yates Shuffle）
        for (let i = tempStages.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [tempStages[i], tempStages[j]] = [tempStages[j], tempStages[i]];
        }

        // 4. 將打亂後的文字與固定座標做綁定，並記住原有的 origId
        gameNodes = tempStages.map((stage, idx) => {
            return {
                ...stage,
                x: positions[idx].x,
                y: positions[idx].y,
                domId: `node-${idx}`
            };
        });

        // 5. 預繪製 10 條在真實修行次第 (origId ➔ origId+1) 之間的連接線（預設隱藏）
        for (let i = 0; i < 10; i++) {
            const fromNode = gameNodes.find(n => n.origId === i);
            const toNode = gameNodes.find(n => n.origId === i + 1);

            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            line.setAttribute('x1', `${fromNode.x}%`);
            line.setAttribute('y1', `${fromNode.y}%`);
            line.setAttribute('x2', `${toNode.x}%`);
            line.setAttribute('y2', `${toNode.y}%`);
            line.setAttribute('class', 'map-line');
            line.setAttribute('id', `line-${i}`);
            svg.appendChild(line);
        }

        // 6. 渲染打亂後的圓圈節點到地圖上
        gameNodes.forEach((node, idx) => {
            const el = document.createElement('div');
            el.className = 'step-node';
            el.style.left = `${node.x}%`;
            el.style.top = `${node.y}%`;
            el.setAttribute('id', node.domId);
            el.setAttribute('onclick', `clickNode(${node.origId}, '${node.domId}')`);

            el.innerHTML = `<span class="node-text">${node.name}</span>`;
            container.appendChild(el);
        });
    }

    // 點擊節點
    // origId: 代表此次第在正確順序中的數字 (0~10)
    // domId: 代表畫面上該圓圈的 DOM ID (0~10，與 origId 無關)
    function clickNode(origId, domId) {
        if (!gameActive) return;

        const msgBox = document.getElementById('msgBox');
        msgBox.classList.remove('error');

        const clickedNode = gameNodes.find(n => n.origId === origId);

        // A. 玩家點到了正確的下一步次第
        if (origId === currentStep + 1) {
            currentStep = origId;
            playSound('bell');
            
            // 點亮節點
            document.getElementById(domId).classList.add('active');

            // 亮起與上一個正確節點之間的線段
            if (origId > 0) {
                document.getElementById(`line-${origId-1}`).classList.add('active');
            }

            // 更新展示該次第的溫馨說明
            msgBox.innerHTML = `🌟 <b>【${clickedNode.name}】</b>已點亮！<br>${clickedNode.desc}`;

            // 判定是否抵達圓滿菩提
            if (currentStep === 10) {
                gameActive = false;
                showSuccess();
            }
        } 
        // B. 點擊了「已經亮起的舊節點」：播放法義，當作複習
        else if (origId <= currentStep) {
            playSound('bell');
            msgBox.innerHTML = `📖 <b>【${clickedNode.name}】</b>的開示：<br>${clickedNode.desc}`;
        } 
        // C. 點擊了不對的下一步（太快或是跳關）：提示法語說明，但線連不上
        else {
            playSound('wood');
            msgBox.classList.add('error');
            
            if (currentStep === -1) {
                msgBox.innerHTML = `🧭 <b>【${clickedNode.name}】</b>：${clickedNode.desc}<br><span style="color:#A94442; font-size:0.85rem;">(提示：此處還不是起點，先在畫面中尋找「凡夫發心」吧。)</span>`;
            } else {
                const nextRequiredNode = gameNodes.find(n => n.origId === currentStep + 1);
                msgBox.innerHTML = `🧭 <b>【${clickedNode.name}】</b>：${clickedNode.desc}<br><span style="color:#A94442; font-size:0.85rem;">(提示：此階段甚好，但在那之前，請先尋找「${nextRequiredNode.name}」。)</span>`;
            }
        }
    }

    function showSuccess() {
        document.getElementById('unlockArea').style.display = 'block';
        const nextBtn = document.getElementById('nextBtn');
        nextBtn.classList.remove('disabled');
        nextBtn.removeAttribute('disabled');
        nextBtn.innerText = "理清次第，取得「行願圓滿金蓮」";
    }

    function resetGame() {
        currentStep = -1;
        gameActive = true;
        
        // 重新呼叫 initMap()，實現「每次重玩，位置全部重新隨機打亂」
        initMap();

        const msgBox = document.getElementById('msgBox');
        msgBox.classList.remove('error');
        msgBox.innerHTML = "🕯️ 修行已重置並隨機錯落。請先點擊起點：【凡夫發心】...";
        
        document.getElementById('unlockArea').style.display = 'none';
        
        const nextBtn = document.getElementById('nextBtn');
        nextBtn.classList.add('disabled');
        nextBtn.setAttribute('disabled', 'true');
        nextBtn.innerText = "請先完成修行次第";
    }

    function nextStep() {
        alert("恭喜圓滿！修行次第瞭然於心，你成功解鎖了行願圓滿金蓮！");
    }

    window.onload = initMap;
</script>

</body>
</html>
