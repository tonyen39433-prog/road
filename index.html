<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>六根迷宮 - 菩提心路尋蹤</title>
    <style>
        :root {
            --primary-color: #5C6B73; 
            --accent-color: #D3A25D; 
            --bg-color: #FAF8F5; 
            --text-color: #333333;
            --card-bg: #FFFFFF;
            --success-color: #4A7C59; 
            --light-success: #EBF5EE;
            
            --node-default-bg: #EAE6DF;
            --node-default-border: #D1C9BC;
            --node-active-bg: #FFF3D6;
            --node-active-border: #D3A25D;
            --node-active-text: #8C6221;
        }

        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .game-container {
            width: 100%;
            max-width: 550px;
            background-color: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.05);
            padding: 25px;
            border-top: 8px solid var(--primary-color);
            box-sizing: border-box;
            position: relative;
        }

        .header-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            font-size: 0.85rem;
            color: #777;
            border-bottom: 1px solid #EEE;
            padding-bottom: 8px;
        }

        .precept-badge {
            display: inline-block;
            background-color: #EAECE9;
            color: var(--primary-color);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .story-section {
            font-size: 1.05rem;
            line-height: 1.8;
            margin-bottom: 15px;
            white-space: pre-line;
        }

        /* --- 法語小說明看板 --- */
        .msg-box {
            background-color: #F5F3EE;
            border: 1px solid #E4DFD5;
            color: #555;
            padding: 12px 18px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.95rem;
            line-height: 1.6;
            min-height: 48px;
            text-align: center;
            transition: all 0.3s ease;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.02);
        }
        .msg-box.error {
            background-color: #FDF2F2;
            border-color: #F3D8D8;
            color: #A94442;
            animation: shake 0.3s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* --- 迷宮畫布與節點地圖區 --- */
        .map-container {
            position: relative;
            width: 100%;
            height: 480px;
            background: radial-gradient(circle, #FCFAF7 0%, #F3EFE9 100%);
            border: 2px solid #E4DFD5;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 20px;
            user-select: none;
        }

        /* SVG 繪製連接線 */
        .map-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .map-line {
            stroke: var(--accent-color);
            stroke-width: 6;
            stroke-dasharray: 0;
            opacity: 0; /* 預設隱藏，答對才顯示 */
            transition: opacity 0.6s ease;
        }

        .map-line.active {
            opacity: 1;
        }

        /* 修行次第節點 (無數字版) */
        .step-node {
            position: absolute;
            width: 82px;
            height: 82px;
            margin-left: -41px; 
            margin-top: -41px;
            background-color: var(--node-default-bg);
            border: 2px solid var(--node-default-border);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 2;
            box-shadow: 0 4px 8px rgba(0,0,0,0.04);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            -webkit-tap-highlight-color: transparent;
        }

        .step-node .node-text {
            font-size: 0.82rem;
            font-weight: bold;
            color: #555;
            text-align: center;
            line-height: 1.3;
            padding: 0 6px;
        }

        /* 點亮激活狀態 */
        .step-node.active {
            background-color: var(--node-active-bg);
            border-color: var(--node-active-border);
            color: var(--node-active-text);
            box-shadow: 0 0 15px rgba(211, 162, 93, 0.5);
            transform: scale(1.08);
        }

        .step-node.active .node-text {
            color: #614417;
        }

        /* --- 成功解鎖區 --- */
        .unlock-area {
            display: none;
            background-color: var(--light-success);
            border-left: 5px solid var(--success-color);
            color: #2D5136;
            padding: 15px;
            border-radius: 8px;
            margin-top: 25px;
            animation: fadeIn 0.5s ease;
            line-height: 1.6;
        }

        .action-btn {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 1.05rem;
            cursor: pointer;
            margin-top: 15px;
            transition: background 0.2s;
            font-weight: bold;
        }

        .action-btn.disabled {
            background-color: #CCCCCC;
            cursor: not-allowed;
        }

        .reset-btn {
            background-color: #FFFFFF;
            border: 1px solid #D1C9BC;
            color: #666;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
            display: block;
            margin: 0 auto 15px auto;
        }

        .reset-btn:hover {
            background-color: #FAF8F5;
            color: var(--accent-color);
            border-color: var(--accent-color);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="game-container">
    <div class="header-info">
        <span>六根迷宮與十大願鑰匙</span>
        <span>第九站：心路尋蹤</span>
    </div>

    <div class="precept-badge">菩提實踐地圖</div>
    
    <div class="story-section">
        迷宮中散落著不同的修行階段。請發揮智慧，<b>尋找下一個合適的成佛次第</b>。
        
        <b>操作說明：</b>
        1. 點擊任何圓圈，皆可<b>閱讀其法義小說明</b>。
        2. 當你依序點中正確的下一步，菩提之路便會<b>顯發金色光芒並相連</b>！
    </div>

    <button class="reset-btn" onclick="resetGame()">🔄 重置修行路徑</button>

    <!-- 智慧法語看板 -->
    <div class="msg-box" id="msgBox">🕯️ 請先點擊這條成佛之路的起點：【凡夫發心】...</div>

    <!-- 節點迷宮地圖 -->
    <div class="map-container" id="mapContainer">
        <!-- SVG 繪線層 -->
        <svg class="map-svg" id="mapSvg">
            <!-- 線段由 JS 動態生成 -->
        </svg>

        <!-- 節點層由 JS 渲染 -->
    </div>

    <!-- 成功通關提示 -->
    <div class="unlock-area" id="unlockArea">
        <b>🌸 自覺自證，行願圓滿：</b><br>
        你在沒有提示的迷宮中，用智慧與定力理清了成佛的次第，並為自己鋪設出一條不退轉的黃金菩提大道！
        
        恭喜你獲得第九把願力鑰匙：<b>行願圓滿金鑰</b>！
    </div>

    <button class="action-btn disabled" id="nextBtn" disabled onclick="nextStep()">請先完成修行次第</button>
</div>

<script>
    // 11 個修行次第、法義小說明
    const stages = [
        { name: "凡夫發心", desc: "「發菩提心，萬行之始。」眾生皆有佛性，修行從這裡起步。" },
        { name: "受持三皈", desc: "「皈依佛、法、僧。」確定人生的解脫方向，不再迷茫。" },
        { name: "嚴持五戒", desc: "「不殺、不盜、不邪淫、不妄語、不飲酒。」防非止惡，淨化人格。" },
        { name: "廣修布施", desc: "「捨去慳貪，廣結善緣。」財布施、法布施、無畏布施。" },
        { name: "常行忍辱", desc: "「難忍能忍，心如大地。」調伏嗔恨，以寬容面對逆境。" },
        { name: "勇猛精進", desc: "「不懈不退，向善前行。」恆持道心，不因疲憊而止步。" },
        { name: "修習禪定", desc: "「主敬存心，心不隨境轉。」專注當下，不生雜念與妄想。" },
        { name: "顯發般若", desc: "「智慧開顯，照見空性。」不被現象迷惑，體證大乘智慧。" },
        { name: "實踐四攝", desc: "「布施、愛語、利行、同事。」走入人群，以慈悲方法攝受眾生。" },
        { name: "悲智雙運", desc: "「悲不滯空，智不隨有。」既有出世的清淨智慧，又有入世的慈悲行願。" },
        { name: "圓滿菩提", desc: "「功德圓滿，覺行圓滿。」抵達佛道終點，圓滿無上正等正覺。" }
    ];

    // 錯落有致的坐標，隱去次第感，增加探索樂趣
    const positions = [
        { x: 18, y: 90 }, // 0. 凡夫發心 (左下角)
        { x: 50, y: 88 }, // 1. 受持三皈
        { x: 82, y: 80 }, // 2. 嚴持五戒
        { x: 75, y: 60 }, // 3. 廣修布施
        { x: 45, y: 68 }, // 4. 常行忍辱 
        { x: 18, y: 65 }, // 5. 勇猛精進
        { x: 15, y: 45 }, // 6. 修習禪定
        { x: 45, y: 42 }, // 7. 顯發般若 (中央)
        { x: 80, y: 38 }, // 8. 實踐四攝
        { x: 72, y: 18 }, // 9. 悲智雙運
        { x: 45, y: 10 }  // 10. 圓滿菩提 (最上方)
    ];

    let currentStep = -1; // 當前正確修行進度 (-1 到 10)
    let gameActive = true;

    // Web Audio API 模擬引磬 (bell) 與木魚 (wood)
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playSound(type) {
        if (!audioCtx) return;
        if (audioCtx.state === 'suspended') audioCtx.resume();

        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        if (type === 'bell') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, audioCtx.currentTime); 
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.2);
            osc.start();
            osc.stop(audioCtx.currentTime + 1.2);
        } else if (type === 'wood') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(140, audioCtx.currentTime); 
            gain.gain.setValueAtTime(0.8, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.15);
        }
    }

    function initMap() {
        const container = document.getElementById('mapContainer');
        const svg = document.getElementById('mapSvg');
        
        // 清空
        const nodes = container.querySelectorAll('.step-node');
        nodes.forEach(n => n.remove());
        svg.innerHTML = '';

        // 1. 先生成所有次第連接線（預設透明度為 0）
        for (let i = 0; i < stages.length - 1; i++) {
            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            line.setAttribute('x1', `${positions[i].x}%`);
            line.setAttribute('y1', `${positions[i].y}%`);
            line.setAttribute('x2', `${positions[i+1].x}%`);
            line.setAttribute('y2', `${positions[i+1].y}%`);
            line.setAttribute('class', `map-line`);
            line.setAttribute('id', `line-${i}`);
            svg.appendChild(line);
        }

        // 2. 生成無數字節點
        stages.forEach((stage, idx) => {
            const node = document.createElement('div');
            node.className = 'step-node';
            node.style.left = `${positions[idx].x}%`;
            node.style.top = `${positions[idx].y}%`;
            node.setAttribute('id', `node-${idx}`);
            node.setAttribute('onclick', `clickNode(${idx})`);

            node.innerHTML = `
                <span class="node-text">${stage.name}</span>
            `;

            container.appendChild(node);
        });
    }

    function clickNode(idx) {
        if (!gameActive) return;

        const msgBox = document.getElementById('msgBox');
        msgBox.classList.remove('error');

        // 玩家點擊了正確的「下一步」次第
        if (idx === currentStep + 1) {
            currentStep = idx;
            playSound('bell');
            
            // 點亮節點
            document.getElementById(`node-${idx}`).classList.add('active');

            // 顯現並亮起與上一個節點的線段
            if (idx > 0) {
                document.getElementById(`line-${idx-1}`).classList.add('active');
            }

            // 更新展示該次第的溫馨說明
            msgBox.innerHTML = `🌟 <b>【${stages[idx].name}】</b>已點亮！<br>${stages[idx].desc}`;

            // 判定是否抵達圓滿菩提
            if (currentStep === 10) {
                gameActive = false;
                showSuccess();
            }
        } 
        // 如果點擊了「已經亮起的節點」：只播放法義小說明，當作複習
        else if (idx <= currentStep) {
            playSound('bell');
            msgBox.innerHTML = `📖 <b>【${stages[idx].name}】</b>的開示：<br>${stages[idx].desc}`;
        } 
        // 點擊了尚未開啟的其它節點：播放法義，但給予溫和的「非下一步」提醒
        else {
            playSound('wood');
            msgBox.classList.add('error');
            
            if (currentStep === -1) {
                msgBox.innerHTML = `🧭 <b>【${stages[idx].name}】</b>：${stages[idx].desc}<br><span style="color:#A94442; font-size:0.85rem;">(提示：此處還不是修行的起點，先尋找「凡夫發心」吧。)</span>`;
            } else {
                msgBox.innerHTML = `🧭 <b>【${stages[idx].name}】</b>：${stages[idx].desc}<br><span style="color:#A94442; font-size:0.85rem;">(提示：此階段甚好，但在那之前，請先尋找「${stages[currentStep+1].name}」。)</span>`;
            }
        }
    }

    function showSuccess() {
        document.getElementById('unlockArea').style.display = 'block';
        const nextBtn = document.getElementById('nextBtn');
        nextBtn.classList.remove('disabled');
        nextBtn.removeAttribute('disabled');
        nextBtn.innerText = "理清次第，取得「行願圓滿金鑰」";
    }

    function resetGame() {
        currentStep = -1;
        gameActive = true;
        
        document.querySelectorAll('.step-node').forEach(node => node.classList.remove('active'));
        document.querySelectorAll('.map-line').forEach(line => line.classList.remove('active'));

        const msgBox = document.getElementById('msgBox');
        msgBox.classList.remove('error');
        msgBox.innerHTML = "🕯️ 修行已重置。請先點擊起點：【凡夫發心】...";
        
        document.getElementById('unlockArea').style.display = 'none';
        
        const nextBtn = document.getElementById('nextBtn');
        nextBtn.classList.add('disabled');
        nextBtn.setAttribute('disabled', 'true');
        nextBtn.innerText = "請先完成修行次第";
    }

    function nextStep() {
        alert("恭喜圓滿！修行次第瞭然於心，你成功解鎖了行願圓滿金鑰！");
    }

    window.onload = initMap;
</script>

</body>
</html>
